
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { display: grid; grid-template-rows: auto 6px auto; gap: 0; }
#top { display: grid; grid-template-columns: minmax(0, 1fr) 6px minmax(0, 1fr); grid-template-rows: minmax(0, 1fr); gap: 0; height: 420px; overflow: hidden; }
.divider { background: var(--color-border-tertiary, #ccc); transition: background 0.15s; }
.divider:hover, .divider.dragging { background: #e86b2a; }
#v-divider { cursor: col-resize; border-top: 0.5px solid var(--color-border-tertiary); border-bottom: 0.5px solid var(--color-border-tertiary); }
#h-divider { cursor: row-resize; border-left: 0.5px solid var(--color-border-tertiary); border-right: 0.5px solid var(--color-border-tertiary); }
#sim-panel { background: #87CEEB; position: relative; overflow: hidden; border-radius: var(--border-radius-lg) 0 0 0; border: 0.5px solid var(--color-border-tertiary); }
#right-panel { display: flex; flex-direction: column; gap: 0; border-radius: 0 var(--border-radius-lg) 0 0; border: 0.5px solid var(--color-border-tertiary); border-left: none; background: var(--color-background-primary); }
#chart-area { flex: 1; padding: 10px; }
#stats-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; text-align: center; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.stat-value { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
#bottom-panel { background: var(--color-background-primary); border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); border-top: none; padding: 12px 16px; display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
.param-group { display: flex; flex-direction: column; gap: 4px; min-width: 120px; flex: 1; }
.param-label { font-size: 11px; color: var(--color-text-secondary); display: flex; justify-content: space-between; }
.param-label span { font-weight: 500; color: var(--color-text-primary); }
input[type=range] { width: 100%; }
select { width: 100%; font-size: 13px; padding: 4px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
#launch-btn { background: #e86b2a; color: white; border: none; border-radius: var(--border-radius-md); padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; min-width: 100px; align-self: flex-end; }
#launch-btn:hover { background: #c95a1e; }
#launch-btn:active { transform: scale(0.97); }
#stop-btn { background: #c0392b; color: white; border: none; border-radius: var(--border-radius-md); padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; min-width: 100px; align-self: flex-end; display: none; }
#stop-btn:hover { background: #a93226; }
#stop-btn:active { transform: scale(0.97); }
canvas { display: block; }
</style>

<div id="app">
  <div id="top">
    <div id="sim-panel">
      <canvas id="sim-canvas"></canvas>
    </div>
    <div class="divider" id="v-divider"></div>
    <div id="right-panel">
      <div id="chart-area">
        <canvas id="traj-canvas"></canvas>
      </div>
      <div id="stats-area">
        <div class="stat-card"><div class="stat-label">height</div><div class="stat-value" id="stat-h">0 m</div></div>
        <div class="stat-card"><div class="stat-label">speed</div><div class="stat-value" id="stat-v">0 m/s</div></div>
        <div class="stat-card"><div class="stat-label">range</div><div class="stat-value" id="stat-r">0 m</div></div>
        <div class="stat-card"><div class="stat-label">time</div><div class="stat-value" id="stat-t">0 s</div></div>
        <div class="stat-card"><div class="stat-label">max height</div><div class="stat-value" id="stat-mh">0 m</div></div>
        <div class="stat-card"><div class="stat-label">status</div><div class="stat-value" id="stat-s" style="color:#e86b2a">ready</div></div>
      </div>
    </div>
  </div>
  <div class="divider" id="h-divider"></div>
  <div id="bottom-panel">
    <div class="param-group">
      <div class="param-label">planet <span id="lbl-planet">Earth</span></div>
      <select id="planet"></select>
    </div>
    <div class="param-group">
      <div class="param-label">launch angle <span id="lbl-angle">45°</span></div>
      <input type="range" id="angle" min="10" max="85" value="45" step="1">
    </div>
    <div class="param-group">
      <div class="param-label">initial height <span id="lbl-height">3 m</span></div>
      <input type="range" id="init-height" min="0" max="20" value="3" step="1">
    </div>
    <div class="param-group">
      <div class="param-label">launch speed <span id="lbl-speed">25 m/s</span></div>
      <input type="range" id="speed" min="5" max="80" value="25" step="1">
    </div>
    <div class="param-group">
      <div class="param-label">wind (m/s) <span id="lbl-wind">0</span></div>
      <input type="range" id="wind" min="-15" max="15" value="0" step="1">
    </div>
    <button id="launch-btn">Launch!</button>
    <button id="stop-btn">Stop</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="planets.js"></script>
<script src="physics.js"></script>
<script src="renderer.js"></script>
<script src="chart-manager.js"></script>
<script src="app.js"></script>
